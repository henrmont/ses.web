<mat-card class="login-card" appearance="raised">
    <mat-card-content>
        <form [formGroup]="authForm" (ngSubmit)="onAuthSubmit()">
            <mat-form-field appearance="outline">
                <mat-label>Email</mat-label>
                <input matInput type="email" formControlName="email">
                <mat-icon matSuffix>alternate_email</mat-icon>
            </mat-form-field>
            <mat-form-field appearance="outline">
                <mat-label>Senha</mat-label>
                <input matInput type="password" formControlName="password">
                <mat-icon matSuffix>password</mat-icon>
            </mat-form-field>
            <button matButton="filled" type="submit">Entrar</button>
            <p>Esqueceu a senha? <button matButton type="button">Clique aqui</button></p>
        </form>
    </mat-card-content>
    <mat-card-footer>
        
    </mat-card-footer>
</mat-card>
