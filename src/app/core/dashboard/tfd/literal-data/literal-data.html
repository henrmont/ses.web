<section>
  @for (card of dashboardCards; track card.title) {
    <mat-card class="example-card" appearance="raised">
      <mat-card-header>
        <mat-card-subtitle>{{ card.title }}</mat-card-subtitle>
      </mat-card-header>
      
      <mat-card-content>
        <div class="card-main-info" [style.color]="card.iconColor">
          <mat-icon class="icon">{{ card.icon }}</mat-icon>
          <h2>{{ card.value }}</h2>
        </div>
        
        <div class="card-trend-info">
          <div class="trend-badge" [ngClass]="card.isUp ? 'trend-up' : 'trend-down'">
            <mat-icon>{{ card.isUp ? 'arrow_drop_up' : 'arrow_drop_down' }}</mat-icon>
            <span>{{ card.percentage }}</span>
          </div>
          <span class="trend-label">vs mês anterior</span>
        </div>
      </mat-card-content>
    </mat-card>
  }
</section>
