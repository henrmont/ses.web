<mat-card appearance="raised" class="chart-card">
  <mat-card-header>
    <mat-card-subtitle>EFICIÊNCIA OPERACIONAL</mat-card-subtitle>
  </mat-card-header>
  
  <mat-card-content>
    <canvas baseChart
            [data]="barChartData"
            [options]="barChartOptions"
            [type]="'bar'">
    </canvas>
  </mat-card-content>
</mat-card>
