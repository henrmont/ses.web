<section>
    <div class="search">
        <mat-form-field appearance="outline">
          <mat-label>Buscar</mat-label>
          <input matInput (keyup)="applyFilter($event)" placeholder="buscar regra" #input>
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>
    </div>
    
    <table mat-table [dataSource]="dataSource()">
      
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef style="width: 74%;"> Nome </th>
        <td mat-cell *matCellDef="let element"> {{ element.name.split('/').pop() }} </td>
      </ng-container>
    
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="center" style="width: 16%;"> Ações </th>
        <td mat-cell *matCellDef="let element" class="center" style="display: flex; justify-content: flex-end;">
            <div>
                <button matIconButton 
                        matTooltip="Atualizar regra" 
                        (click)="updateRole(element)"
                        [disabled]="ownerRole(element) || checkPermissions('transplante/regra atualizar')">
                    <mat-icon>drive_file_rename_outline</mat-icon>
                </button>
                
                <button matIconButton 
                        matTooltip="Deletar regra" 
                        (click)="deleteRole(element)"
                        [disabled]="ownerRole(element) || checkPermissions('transplante/regra deletar')">
                    <mat-icon>delete</mat-icon>
                </button>
            </div>
        </td>
      </ng-container>
    
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell center" colspan="2">Nenhum resultado encontrado.</td>
      </tr>
    </table>
</section>
