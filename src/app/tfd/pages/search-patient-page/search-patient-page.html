<section>
    <div class="search">
        <mat-form-field appearance="outline">
          <mat-label>Buscar</mat-label>
          <input matInput (keyup)="applyFilter($event)" placeholder="buscar usuário" #input>
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>
    </div>
    
    <table mat-table [dataSource]="dataSource()">
        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Name </th>
            <td mat-cell *matCellDef="let element"> {{element.name}} </td>
        </ng-container>

        <ng-container matColumnDef="cns">
            <th mat-header-cell *matHeaderCellDef> CNS </th>
            <td mat-cell *matCellDef="let element"> {{element.cns | mask:'000 0000 0000 0000'}} </td>
        </ng-container>

        <ng-container matColumnDef="responsible">
            <th mat-header-cell *matHeaderCellDef> Responsável </th>
            <td mat-cell *matCellDef="let element"> {{element.user.professional.name}} </td>
        </ng-container>

        <ng-container matColumnDef="valid">
        <th mat-header-cell *matHeaderCellDef class="center" style="width: 5%;"> Status </th>
        <td mat-cell *matCellDef="let element" class="center">
            @if (element.status) {
            <button matIconButton [matTooltip]="element.is_valid ? 'Inativar paciente' : 'Ativar paciente'">
                <mat-icon [className]="element.is_valid ? 'valid' : 'invalid'">{{ element.is_valid ? 'check' : 'close' }}</mat-icon>
            </button>
            } @else {
            <button matIconButton disabled>
                <mat-icon class="invalid">priority_high</mat-icon>
            </button>
            }
        </td>
        </ng-container>

        <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="center" style="width: 25%;"> Ações </th>
        <td mat-cell *matCellDef="let element" class="center">
            <div>
                <button matIconButton matTooltip="Detalhes do paciente">
                    <mat-icon>visibility</mat-icon>
                </button>
                <button matIconButton matTooltip="Atualizar paciente">
                    <mat-icon>drive_file_rename_outline</mat-icon>
                </button>
                <button matIconButton matTooltip="Acompanhantes">
                    <mat-icon>group</mat-icon>
                </button>
                <button matIconButton matTooltip="Laudos">
                    <mat-icon>medical_information</mat-icon>
                </button>
                <button matIconButton matTooltip="Arquivar">
                    <mat-icon>inventory_2</mat-icon>
                </button>
            </div>
        </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell center" colspan="5">Nenhum resultado encontrado.</td>
        </tr>
    </table>
</section>
