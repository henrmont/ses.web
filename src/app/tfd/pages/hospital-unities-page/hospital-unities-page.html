<section>
    <div class="search">
        <mat-form-field appearance="outline">
          <mat-label>Buscar</mat-label>
          <input matInput (keyup)="applyFilter($event)" placeholder="buscar usuário" #input>
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>
    </div>
    
    <table mat-table [dataSource]="dataSource()">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Nome </th>
        <td mat-cell *matCellDef="let element"> {{element.name}} </td>
      </ng-container>

      <ng-container matColumnDef="cnes">
        <th mat-header-cell *matHeaderCellDef> CNES </th>
        <td mat-cell *matCellDef="let element"> {{element.cnes}} </td>
      </ng-container>
    
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="center" style="width: 15%;"> Ações </th>
        <td mat-cell *matCellDef="let element" class="center">
            <div>
                <button matIconButton matTooltip="Detalhes do usuário" (click)="showHospitalUnity(element)">
                    <mat-icon>visibility</mat-icon>
                </button>
                <button matIconButton matTooltip="Atualizar usuário" (click)="updateHospitalUnity(element)" [disabled]="checkPermissions('tfd/unidade hospitalar atualizar')">
                    <mat-icon>drive_file_rename_outline</mat-icon>
                </button>
                <button matIconButton matTooltip="Deletar usuário" (click)="deleteHospitalUnity(element)" [disabled]="checkPermissions('tfd/unidade hospitalar deletar')">
                    <mat-icon>delete</mat-icon>
                </button>
            </div>
        </td>
      </ng-container>
    
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell center" colspan="3">Nenhum resultado encontrado.</td>
      </tr>
    </table>
</section>
