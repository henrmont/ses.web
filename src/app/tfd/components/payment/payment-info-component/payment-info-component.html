<h2 mat-dialog-title>Descrição do pagamento</h2>

<form [formGroup]="paymentInfoForm" (ngSubmit)="onSubmit()">
  <mat-dialog-content>
    
    <div class="line">
      <mat-form-field appearance="outline">
        <mat-label>Descrição</mat-label>
        <textarea matInput rows="6" formControlName="description"></textarea>
        
        @for (item of errorMessages['description']; track $index) {
          <mat-error [hidden]="!paymentInfoForm.get('description')?.hasError(item.type)">
            {{ item.message }}
          </mat-error>
        }
      </mat-form-field>
    </div>

  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button matButton type="button" [mat-dialog-close]="false">Fechar</button>
    
    <button 
      matButton="filled" 
      type="submit" 
      [disabled]="paymentInfoForm.invalid || paymentInfoForm.pending || isSubmitting()"
    >
      <div class="waiting">
        @if (isSubmitting()) {
          <mat-spinner matPrefix [diameter]="20"></mat-spinner>
        }
        Atualizar
      </div>
    </button>
  </mat-dialog-actions>
</form>
