<h2 mat-dialog-title>Arquivar paciente</h2>

<mat-dialog-content>
  Você deseja realmente arquivar o registro do paciente <strong>{{ data.patient_care?.name }}</strong>?<br>
  <span>Esta ação ocultará o paciente da listagem ativa do sistema.</span>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" [mat-dialog-close]="false" [disabled]="isSubmitting()">
    Cancelar
  </button>
  
  <button mat-flat-button color="primary" type="button" [disabled]="isSubmitting()" (click)="onSubmit()">
    <div class="waiting">
      @if (isSubmitting()) {
        <mat-spinner [diameter]="20"></mat-spinner>
      }
      <span>{{ isSubmitting() ? 'Arquivando...' : 'Confirmar' }}</span>
    </div>
  </button>
</mat-dialog-actions>
