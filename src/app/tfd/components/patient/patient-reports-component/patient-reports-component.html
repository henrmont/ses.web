<h2 mat-dialog-title>Laudos do paciente</h2>

<mat-dialog-content>
  @if (isLoading()) {
    <div class="loading-container">
      <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
    </div>
  } @else {
    <table mat-table [dataSource]="dataSource()" class="mat-elevation-z8">
      
      <ng-container matColumnDef="protocol">
        <th mat-header-cell *matHeaderCellDef> Protocolo </th>
        <td mat-cell *matCellDef="let element"> {{ element.protocol }} </td>
      </ng-container>

      <ng-container matColumnDef="cid">
        <th mat-header-cell *matHeaderCellDef> CID </th>
        <td mat-cell *matCellDef="let element"> 
          {{ element.cid.code }} - {{ element.cid.name }} 
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="center" style="width: 15%;"> Ações </th>
        <td mat-cell *matCellDef="let element" class="center" style="display: flex; justify-content: flex-end;">
          <div>
            <button mat-icon-button 
                    matTooltip="Detalhes do laudo" 
                    (click)="showPatientReport(element)">
              <mat-icon>visibility</mat-icon>
            </button>

            <button mat-icon-button 
                    matTooltip="Atualizar laudo" 
                    (click)="updatePatientReport(element)">
              <mat-icon>drive_file_rename_outline</mat-icon>
            </button>

            <button mat-icon-button 
                    matTooltip="Anexos" 
                    (click)="reportAttachments(element)">
              <mat-icon>attach_file</mat-icon>
            </button>

            <button mat-icon-button 
                    matTooltip="Deletar laudo" 
                    (click)="deletePatientReport(element)">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell center" colspan="3">Nenhum laudo cadastrado</td>
      </tr>
    </table>
  }
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-button type="button" [mat-dialog-close]="false">Fechar</button>
  <button matButton="filled" 
          type="button" 
          (click)="createPatientReport()">
    Novo laudo
  </button>
</mat-dialog-actions>
