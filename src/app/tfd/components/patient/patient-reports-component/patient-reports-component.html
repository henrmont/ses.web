<h2 mat-dialog-title>Laudos do paciente</h2>

<mat-dialog-content>
  <div class="reports-container">

    @if (isLoading()) {
      <div class="loading-shade">
        <mat-spinner [diameter]="40"></mat-spinner>
      </div>
    } @else {
      <div class="table-responsive">
        <table mat-table [dataSource]="dataSource()">
            
          <!-- Coluna: Protocolo -->
          <ng-container matColumnDef="protocol">
            <th mat-header-cell *matHeaderCellDef>Protocolo</th>
            <td mat-cell *matCellDef="let element">{{ element.protocol }}</td>
          </ng-container>
  
          <!-- Coluna: CID -->
          <ng-container matColumnDef="cid">
            <th mat-header-cell *matHeaderCellDef>CID</th>
            <td mat-cell *matCellDef="let element">
              {{ element.cid?.code }} - {{ element.cid?.name }}
            </td>
          </ng-container>

          <!-- Coluna: Judicial -->
          <ng-container matColumnDef="lawsuit">
            <th mat-header-cell *matHeaderCellDef class="center lawsuit-column-header">Judicial</th>
            <td mat-cell *matCellDef="let element" class="center">
              <span class="lawsuit-badge">
                @if (element.lawsuit) {
                  <mat-icon class="warning">gavel</mat-icon>
                } 
              </span>
            </td>
          </ng-container>
  
          <!-- Coluna: Ações -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="center actions-column-header">Ações</th>
            <td mat-cell *matCellDef="let element" class="center actions-cell">
              
              <button mat-icon-button type="button" matTooltip="Detalhes do laudo" (click)="showPatientReport(element)">
                <mat-icon color="primary">visibility</mat-icon>
              </button>

              <button mat-icon-button type="button" matTooltip="Anexos" (click)="reportAttachments(element)">
                <mat-icon color="accent">attach_file</mat-icon>
              </button>

              <button mat-icon-button type="button" matTooltip="Atualizar laudo" [disabled]="!element.is_editable" (click)="updatePatientReport(element)">
                <mat-icon class="icon-edit">drive_file_rename_outline</mat-icon>
              </button>

              <button mat-icon-button type="button" matTooltip="Deletar laudo" [disabled]="element.has_patient_request" (click)="deletePatientReport(element)">
                <mat-icon color="warn">delete</mat-icon>
              </button>

            </td>
          </ng-container>
  
          <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  
          <!-- Estado Vazio -->
          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell" [attr.colspan]="displayedColumns.length">
              <div class="empty-state">
                <p>Nenhum laudo cadastrado para este paciente.</p>
              </div>
            </td>
          </tr>
        </table>
      </div>
    }

  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" [mat-dialog-close]="false">Fechar</button>
  <button mat-flat-button color="primary" type="button" (click)="createPatientReport()">
    <mat-icon>add</mat-icon>
    Novo laudo
  </button>
</mat-dialog-actions>
