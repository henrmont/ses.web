<h2 mat-dialog-title>Acompanhantes do paciente</h2>
<mat-dialog-content>
    @if (isLoading()) {
        <div class="loading-container">
            <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
        </div>
    } @else {
        <table mat-table [dataSource]="dataSource()" class="mat-elevation-z8">
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef> Nome </th>
                <td mat-cell *matCellDef="let element"> {{element.name}} </td>
            </ng-container>
    
            <ng-container matColumnDef="document">
                <th mat-header-cell *matHeaderCellDef> CPF </th>
                <td mat-cell *matCellDef="let element"> {{element.document | mask:'000.000.000-00'}} </td>
            </ng-container>
    
            <ng-container matColumnDef="cns">
                <th mat-header-cell *matHeaderCellDef> CNS </th>
                <td mat-cell *matCellDef="let element"> {{element.cns | mask:'000 0000 0000 0000'}} </td>
            </ng-container>

            <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef style="width: 5%;"> Status </th>
                <td mat-cell *matCellDef="let element">
                    <button matIconButton disabled>
                        <mat-icon [className]="element.status ? 'valid' : 'invalid'">
                            {{element.status ? 'check' : 'priority_high'}}
                        </mat-icon>
                    </button>
                </td>
            </ng-container>
    
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef class="center" style="width: 15%;"> Ações </th>
                <td mat-cell *matCellDef="let element" class="center">
                    <div>
                        <button matIconButton matTooltip="Detalhes do acompanhante" (click)="showPatientEscort(element)">
                            <mat-icon>visibility</mat-icon>
                        </button>
                        <button matIconButton matTooltip="Atualizar acompanhante" (click)="updatePatientEscort(element)">
                            <mat-icon>drive_file_rename_outline</mat-icon>
                        </button>
                        <button matIconButton matTooltip="Deletar acompanhante" (click)="deletePatientEscort(element)">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </div>
                </td>
            </ng-container>
    
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    
            <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell" colspan="6" class="center">Nenhum acompanhante cadastrado</td>
            </tr>
        </table>
    }
</mat-dialog-content>
<mat-dialog-actions>
    <button matButton="filled" type="button" (click)="createPatientEscort()">Novo acompanhante</button>
    <button mat-button type="button" [mat-dialog-close]="false">Fechar</button>
</mat-dialog-actions>
