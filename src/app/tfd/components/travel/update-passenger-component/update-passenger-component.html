<h2 mat-dialog-title>Atualizar passageiro</h2>

<form [formGroup]="passengerForm" (ngSubmit)="onSubmit()">
  <mat-dialog-content>
    
    <div class="line" style="grid-template-columns: 1fr 1fr;">
      <mat-form-field appearance="outline">
        <mat-label>Tarifa</mat-label>
        <input matInput type="text" formControlName="tariff">
        
        @for (item of errorMessages['tariff']; track $index) {
          <mat-error [hidden]="!passengerForm.get('tariff')?.hasError(item.type)">
            {{ item.message }}
          </mat-error>
        }
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Taxa</mat-label>
        <input matInput type="text" formControlName="tax">
        
        @for (item of errorMessages['tax']; track $index) {
          <mat-error [hidden]="!passengerForm.get('tax')?.hasError(item.type)">
            {{ item.message }}
          </mat-error>
        }
      </mat-form-field>
    </div>

  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button matButton type="button" [mat-dialog-close]="false">Fechar</button>
    <button 
      matButton="filled" 
      type="submit" 
      [disabled]="passengerForm.invalid || passengerForm.pending || isSubmitting()"
    >
      <div class="waiting">
        @if (isSubmitting()) {
          <mat-spinner matPrefix [diameter]="20"></mat-spinner>
        }
        Atualizar
      </div>
    </button>
  </mat-dialog-actions>
</form>
