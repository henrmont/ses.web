<h2 mat-dialog-title>Viagens</h2>

<mat-dialog-content>
  @if (isLoading()) {
    <div class="loading-container">
      <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
    </div>
  } @else {
    <table mat-table [dataSource]="dataSource()" class="mat-elevation-z8">
      
      <ng-container matColumnDef="os">
        <th mat-header-cell *matHeaderCellDef> OS </th>
        <td mat-cell *matCellDef="let element"> {{ element.os }} </td>
      </ng-container>

      <ng-container matColumnDef="origin">
        <th mat-header-cell *matHeaderCellDef> Origem </th>
        <td mat-cell *matCellDef="let element"> {{ element.origin }} </td>
      </ng-container>

      <ng-container matColumnDef="destination">
        <th mat-header-cell *matHeaderCellDef> Destino </th>
        <td mat-cell *matCellDef="let element"> {{ element.destination }} </td>
      </ng-container>

      <ng-container matColumnDef="departure_date">
        <th mat-header-cell *matHeaderCellDef> Data de embarque </th>
        <td mat-cell *matCellDef="let element"> {{ element.departure_date | date: 'dd/MM/y' }} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="center" style="width: 25%;"> Ações </th>
        <td mat-cell *matCellDef="let element" class="center" style="display: flex; justify-content: flex-end;">
          <div>
            <button mat-icon-button 
                    matTooltip="Detalhes da viagem" 
                    (click)="showTravel(element)">
              <mat-icon>visibility</mat-icon>
            </button>

            <button mat-icon-button 
                    matTooltip="Atualizar viagem" 
                    (click)="updateTravel(element)">
              <mat-icon>drive_file_rename_outline</mat-icon>
            </button>

            <button mat-icon-button 
                    matTooltip="Passageiros" 
                    (click)="passengers(element)">
              <mat-icon>airline_seat_recline_normal</mat-icon>
            </button>

            <button mat-icon-button 
                    matTooltip="Rotas" 
                    (click)="routes(element)">
              <mat-icon>routes</mat-icon>
            </button>

            <button mat-icon-button 
                    matTooltip="Deletar viagem" 
                    (click)="deleteTravel(element)">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell center" colspan="5">Nenhuma viagem cadastrada.</td>
      </tr>
    </table>
  }
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-button type="button" [mat-dialog-close]="false">Fechar</button>
  <button matButton="filled" 
          type="button" 
          (click)="createTravel()">
    Nova viagem
  </button>
</mat-dialog-actions>
