<h2 mat-dialog-title>Rotas</h2>

<mat-dialog-content>
  @if (isLoading()) {
    <div class="loading-container">
      <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
    </div>
  } @else {
    <table mat-table [dataSource]="dataSource()" class="mat-elevation-z8">
      
      <ng-container matColumnDef="origin">
        <th mat-header-cell *matHeaderCellDef> Origem </th>
        <td mat-cell *matCellDef="let element"> {{ element.origin }} </td>
        <td mat-footer-cell *matFooterCellDef></td>
      </ng-container>

      <ng-container matColumnDef="destination">
        <th mat-header-cell *matHeaderCellDef> Destino </th>
        <td mat-cell *matCellDef="let element"> {{ element.destination }} </td>
        <td mat-footer-cell *matFooterCellDef><strong>Distância Total</strong></td>
      </ng-container>

      <ng-container matColumnDef="distance">
        <th mat-header-cell *matHeaderCellDef> Distância </th>
        <td mat-cell *matCellDef="let element"> {{ element.distance ? (element.distance | number:'1.2-2') : 0 }} km </td>
        <td mat-footer-cell *matFooterCellDef><strong>{{ totalDistance() | number:'1.2-2' }} km</strong></td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="center" style="width: 15%;"> Ações </th>
        <td mat-cell *matCellDef="let element" class="center">
          <div>
            <button mat-icon-button 
                    matTooltip="Atualizar rota" 
                    (click)="updateRoute(element)">
              <mat-icon>drive_file_rename_outline</mat-icon>
            </button>
            <button mat-icon-button 
                    matTooltip="Deletar rota" 
                    (click)="deleteRoute(element)">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
        <td mat-footer-cell *matFooterCellDef></td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
      @if (totalDistance() > 0) {
        <tr mat-footer-row *matFooterRowDef="displayedColumns"></tr>
      }

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell center" colspan="4">Nenhuma rota cadastrada.</td>
      </tr>
    </table>
  }
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-button type="button" [mat-dialog-close]="false">Fechar</button>
  <button matButton="filled" 
          type="button" 
          (click)="createRoute()">
    Nova rota
  </button>
</mat-dialog-actions>
