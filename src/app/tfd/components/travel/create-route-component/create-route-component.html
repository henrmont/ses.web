<h2 mat-dialog-title>Nova rota</h2>

<form [formGroup]="createRouteForm" (ngSubmit)="onSubmit()">
  <mat-dialog-content>
    
    <div class="line" style="grid-template-columns: 1fr;">
      <mat-form-field appearance="outline">
        <mat-label>Origem</mat-label>
        <input matInput type="text" formControlName="origin">

        @for (item of errorMessages['origin']; track $index) {
          <mat-error [hidden]="!createRouteForm.get('origin')?.hasError(item.type)">
            {{ item.message }}
          </mat-error>
        }
      </mat-form-field>
    </div>

    <div class="line" style="grid-template-columns: 1fr;">
      <mat-form-field appearance="outline">
        <mat-label>Destino</mat-label>
        <input matInput type="text" formControlName="destination">

        @for (item of errorMessages['destination']; track $index) {
          <mat-error [hidden]="!createRouteForm.get('destination')?.hasError(item.type)">
            {{ item.message }}
          </mat-error>
        }
      </mat-form-field>
    </div>

    <div class="line" style="grid-template-columns: 1fr;">
      <mat-form-field appearance="outline">
        <mat-label>Distância</mat-label>
        <input matInput type="number" formControlName="distance">
      </mat-form-field>
    </div>

  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button matButton type="button" [mat-dialog-close]="false">Fechar</button>
    <button 
      matButton="filled" 
      type="submit" 
      [disabled]="createRouteForm.invalid || createRouteForm.pending || isSubmitting()"
    >
      <div class="waiting">
        @if (isSubmitting()) {
          <mat-spinner matPrefix [diameter]="20"></mat-spinner>
        }
        Criar
      </div>
    </button>
  </mat-dialog-actions>
</form>
