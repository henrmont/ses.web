<h2 mat-dialog-title>Nova rota</h2>
<form [formGroup]="createReportForm">
    <mat-dialog-content>
        <div class="line" style="grid-template-columns: 1fr;">
            <mat-form-field appearance="outline">
                <mat-label>Origem</mat-label>
                <input matInput type="text" formControlName="origin">
                @for (item of errorMessages['origin']; track $index) {
                    <mat-error *ngIf="createReportForm.get('origin')?.hasError(item.type)">{{item.message}}</mat-error>
                }
            </mat-form-field>
        </div>
        <div class="line" style="grid-template-columns: 1fr;">
            <mat-form-field appearance="outline">
                <mat-label>Destino</mat-label>
                <input matInput type="text" formControlName="destination">
                @for (item of errorMessages['destination']; track $index) {
                    <mat-error *ngIf="createReportForm.get('destination')?.hasError(item.type)">{{item.message}}</mat-error>
                }
            </mat-form-field>
        </div>
        <div class="line" style="grid-template-columns: 1fr;">
            <mat-form-field appearance="outline">
                <mat-label>Distância</mat-label>
                <input matInput type="text" formControlName="distance">
            </mat-form-field>
        </div>
    </mat-dialog-content>
    <mat-dialog-actions align="end">
        <button matButton="filled" type="submit" [disabled]="createReportForm.invalid || wSubmit()" (click)="onSubmit()">
            <div class="waiting">
                @if (wSubmit()) {
                    <mat-spinner matPrefix [diameter]="20"></mat-spinner>
                }
                Criar
            </div>
        </button>
        <button matButton [mat-dialog-close]="false">Fechar</button>
    </mat-dialog-actions>
</form>
