<h2 mat-dialog-title>Alterar valor da diária</h2>

<form [formGroup]="updateDailyCostForm" (ngSubmit)="onSubmit()">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Valor</mat-label>
      <input 
        matInput 
        type="text" 
        placeholder="R$ 0,00" 
        mask="separator.2" 
        prefix="R$ " 
        thousandSeparator="." 
        decimalMarker="," 
        [dropSpecialCharacters]="true" 
        formControlName="value"
      >
      
      @if (updateDailyCostForm.get('value')?.invalid && updateDailyCostForm.get('value')?.touched) {
        @for (error of errorMessages['value']; track error.type) {
          @if (updateDailyCostForm.get('value')?.hasError(error.type)) {
            <mat-error>{{ error.message }}</mat-error>
          }
        }
      }
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" [mat-dialog-close]="false" [disabled]="isSubmitting()">
      Fechar
    </button>

    <button 
      mat-flat-button 
      type="submit" 
      [disabled]="updateDailyCostForm.invalid || updateDailyCostForm.pristine || isSubmitting()"
    >
      <div class="waiting">
        @if (isSubmitting()) {
          <mat-spinner [diameter]="20"></mat-spinner>
        }
        Alterar
      </div>
    </button>
  </mat-dialog-actions>
</form>
