<h2 mat-dialog-title>Atualizar diária</h2>

<form [formGroup]="updateCostAssistanceDailyForm" (ngSubmit)="onSubmit()">
  <mat-dialog-content>
    
    <div class="line">
      <mat-form-field appearance="outline">
        <mat-label>Tipo de diária</mat-label>
        <mat-select formControlName="daily_cost_id">
          @for (item of dailyCostsOptions(); track item.id || $index) {
            <mat-option [value]="item.id">{{ item.name }}</mat-option>
          }
        </mat-select>
        
        @for (item of errorMessages['daily_cost_id']; track $index) {
          <mat-error [hidden]="!updateCostAssistanceDailyForm.get('daily_cost_id')?.hasError(item.type)">
            {{ item.message }}
          </mat-error>
        }
      </mat-form-field>
    </div>

    <div class="line">
      <mat-form-field appearance="outline">
        <mat-label>Quantidade</mat-label>
        <input matInput type="number" formControlName="amount" min="1">
        
        @for (item of errorMessages['amount']; track $index) {
          <mat-error [hidden]="!updateCostAssistanceDailyForm.get('amount')?.hasError(item.type)">
            {{ item.message }}
          </mat-error>
        }
      </mat-form-field>
    </div>

  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button matButton type="button" [mat-dialog-close]="false">Fechar</button>
    <button 
      matButton="filled" 
      type="submit" 
      [disabled]="updateCostAssistanceDailyForm.invalid || updateCostAssistanceDailyForm.pending || isSubmitting()"
    >
      <div class="waiting">
        @if (isSubmitting()) {
          <mat-spinner matPrefix [diameter]="20"></mat-spinner>
        }
        Atualizar
      </div>
    </button>
  </mat-dialog-actions>
</form>
