<h2 mat-dialog-title>Nova ajuda de custo</h2>

<form [formGroup]="createCostAssistanceForm" (ngSubmit)="onSubmit()">
  <mat-dialog-content>
    
    <div class="line">
      <mat-form-field appearance="outline">
        <mat-label>Nome</mat-label>
        <input matInput type="text" formControlName="name">
        
        @for (item of errorMessages['name']; track $index) {
          <mat-error [hidden]="!createCostAssistanceForm.get('name')?.hasError(item.type)">
            {{ item.message }}
          </mat-error>
        }
      </mat-form-field>
    </div>

    <div class="line">
      <mat-form-field appearance="outline">
        <mat-label>Tipo</mat-label>
        <mat-select formControlName="type">
          @for (item of types; track $index) {
            <mat-option [value]="item">{{ item }}</mat-option>
          }
        </mat-select>

        @for (item of errorMessages['type']; track $index) {
          <mat-error [hidden]="!createCostAssistanceForm.get('type')?.hasError(item.type)">
            {{ item.message }}
          </mat-error>
        }
      </mat-form-field>
    </div>

  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button matButton type="button" [mat-dialog-close]="false">Fechar</button>
    <button 
      matButton="filled" 
      type="submit" 
      [disabled]="createCostAssistanceForm.invalid || createCostAssistanceForm.pending || isSubmitting()"
    >
      <div class="waiting">
        @if (isSubmitting()) {
          <mat-spinner matPrefix [diameter]="20"></mat-spinner>
        }
        Criar
      </div>
    </button>
  </mat-dialog-actions>
</form>
