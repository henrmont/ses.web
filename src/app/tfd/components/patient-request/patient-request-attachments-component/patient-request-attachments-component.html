<h2 mat-dialog-title>Arquivos da solicitação</h2>

<mat-dialog-content>
  @if (isLoading()) {
    <div class="loading-container">
      <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
    </div>
  } @else {
    <table mat-table [dataSource]="dataSource()" class="mat-elevation-z8">
      
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Nome </th>
        <td mat-cell *matCellDef="let element"> {{ element.name }} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="center" style="width: 12%;"> Ações </th>
        <td mat-cell *matCellDef="let element" class="center" style="display: flex; justify-content: flex-end;">
          <div>
            <button mat-icon-button 
                    matTooltip="Download do arquivo" 
                    (click)="download(element.archive_id, element.name)">
              <mat-icon>download</mat-icon>
            </button>

            <button mat-icon-button 
                    matTooltip="Atualizar arquivo" 
                    (click)="updatePatientRequestAttachment(element)">
              <mat-icon>drive_file_rename_outline</mat-icon>
            </button>

            <button mat-icon-button 
                    matTooltip="Deletar arquivo" 
                    (click)="deletePatientRequestAttachment(element)">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell center" colspan="2">Nenhum arquivo encontrado</td>
      </tr>
    </table>
  }
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-button type="button" [mat-dialog-close]="false">Fechar</button>
  <button matButton="filled" 
          type="button" 
          (click)="createPatientRequestAttachment()">
    Novo arquivo
  </button>
</mat-dialog-actions>
