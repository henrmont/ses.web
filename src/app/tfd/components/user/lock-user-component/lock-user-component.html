<h2 mat-dialog-title>{{ data.user.module.pivot.is_editable ? 'Travar usuário' : 'Destravar usuário' }}</h2>
<mat-dialog-content>{{ data.user.module.pivot.is_editable ? 'Você deseja travar a edição do usuário?' : 'Você deseja destravar a edição do usuário?' }}</mat-dialog-content>
<mat-dialog-actions>
    <button matButton="filled" [disabled]="wSubmit()" (click)="onSubmit()">
        <div class="waiting">
            @if (wSubmit()) {
                <mat-spinner matPrefix [diameter]="20"></mat-spinner>
            }
            {{ data.user.module.pivot.is_editable ? 'Travar' : 'Destravar' }}
        </div>
    </button>
    <button matButton [mat-dialog-close]="false">Fechar</button>
</mat-dialog-actions>
