<h2 mat-dialog-title>Deletar usuário</h2>

<mat-dialog-content>
  <p>
    Você deseja realmente deletar o usuário <strong>{{ data.user.professional?.name || data.user.name }}</strong>?<br> 
    <span>Esta ação não poderá ser desfeita.</span>
  </p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" [mat-dialog-close]="false" [disabled]="isSubmitting()">
    Cancelar
  </button>
  
  <button mat-flat-button color="warn" type="button" [disabled]="isSubmitting()" (click)="onSubmit()">
    <div class="waiting">
      @if (isSubmitting()) {
        <mat-spinner [diameter]="20"></mat-spinner>
      }
      <span>{{ isSubmitting() ? 'Excluindo...' : 'Confirmar Exclusão' }}</span>
    </div>
  </button>
</mat-dialog-actions>
