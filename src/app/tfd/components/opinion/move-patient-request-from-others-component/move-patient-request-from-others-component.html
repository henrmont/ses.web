<h2 mat-dialog-title>Mover para minha caixa</h2>
<mat-dialog-content>Você deseja mover a solicitação para sua caixa?</mat-dialog-content>
<mat-dialog-actions>
    <button matButton="filled" [disabled]="wSubmit()" (click)="onMovePatientRequestFromOthersSubmit()">
        <div class="waiting">
            @if (wSubmit()) {
                <mat-spinner matPrefix [diameter]="20"></mat-spinner>
            }
            Mover
        </div>
    </button>
    <button matButton [mat-dialog-close]="false">Fechar</button>
</mat-dialog-actions>
