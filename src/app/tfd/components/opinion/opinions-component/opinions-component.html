<h2 mat-dialog-title>Lista de pareceres</h2>
<mat-dialog-content>
    @if (isLoading()) {
        <div class="loading-container">
            <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
        </div>
    } @else {
        <table mat-table [dataSource]="dataSource()" class="mat-elevation-z8">
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef> Nome </th>
                <td mat-cell *matCellDef="let element"> {{element.name}} </td>
            </ng-container>

            <ng-container matColumnDef="owner">
                <th mat-header-cell *matHeaderCellDef> Nome </th>
                <td mat-cell *matCellDef="let element"> {{element.professional.name}} </td>
            </ng-container>
    
            <ng-container matColumnDef="is_approved">
                <th mat-header-cell *matHeaderCellDef style="width: 5%;"> Status </th>
                <td mat-cell *matCellDef="let element">
                    <button matIconButton disabled>
                        <mat-icon [className]="element.is_approved ? 'valid' : 'invalid'">
                            {{element.is_approved ? 'check' : 'priority_high'}}
                        </mat-icon>
                    </button>
                </td>
            </ng-container>
    
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef class="center" style="width: 15%;"> Ações </th>
                <td mat-cell *matCellDef="let element" class="center">
                    <div>
                        <button matIconButton matTooltip="Detalhes do parecer" (click)="showOpinion(element)">
                            <mat-icon>visibility</mat-icon>
                        </button>
                        <button matIconButton matTooltip="Atualizar parecer" (click)="updateOpinion(element)" [disabled]="checkPermissions('tfd/parecer atualizar') || !element.my_opinion">
                            <mat-icon>drive_file_rename_outline</mat-icon>
                        </button>
                        <button matIconButton matTooltip="Deletar parecer" (click)="deleteOpinion(element)" [disabled]="checkPermissions('tfd/parecer deletar') || !element.my_opinion">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </div>
                </td>
            </ng-container>
    
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    
            <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell center" colspan="4" class="center">Nenhum parecer cadastrado</td>
            </tr>
        </table>
    }
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton="filled" (click)="createOpinion()" [disabled]="checkPermissions('tfd/parecer criar') || isLoading()">Novo parecer</button>
  <button matButton [mat-dialog-close]="false">Fechar</button>
</mat-dialog-actions>
