<h2 mat-dialog-title>Arquivar solicitação</h2>
<mat-dialog-content>Você deseja arquivar a solicitação?</mat-dialog-content>
<mat-dialog-actions>
    <button matButton="filled" [disabled]="wSubmit()" (click)="onArchivePatientRequestSubmit()">
      <div class="waiting">
          @if (wSubmit()) {
              <mat-spinner matPrefix [diameter]="20"></mat-spinner>
          }
          Arquivar
      </div>
    </button>
  <button matButton [mat-dialog-close]="false">Fechar</button>
</mat-dialog-actions>
