<h2 mat-dialog-title>Atualizar parecer</h2>
<form [formGroup]="updateOpinionForm" (ngSubmit)="onUpdateOpinionSubmit()">
    <mat-dialog-content>
        <div style="margin-top: 10px; display: flex; flex-direction: column; gap: 10px;">
            <div class="line" style="grid-template-columns: 2fr 1fr;">
                <mat-form-field appearance="outline">
                    <mat-label>Nome</mat-label>
                    <input matInput type="text" formControlName="name">
                    @for (item of errorMessages['name']; track $index) {
                        <mat-error *ngIf="updateOpinionForm.get('name')?.hasError(item.type)">{{item.message}}</mat-error>
                    }
                </mat-form-field>
                <div class="toggle">
                    <mat-slide-toggle formControlName="is_approved"><span>Parecer favorável</span></mat-slide-toggle>
                </div>
            </div>
            <div style="grid-template-columns: 1fr;" class="my-custom-editor line">
                <div class="NgxEditor__Wrapper">
                    <ngx-editor-menu [editor]="editor" [toolbar]="toolbar"> </ngx-editor-menu>
                    <ngx-editor
                        [editor]="editor"
                        formControlName="content"
                        placeholder="Parecer..."
                        outputFormat="html"
                    ></ngx-editor>
                </div>
            </div>
        </div>
    </mat-dialog-content>
    <mat-dialog-actions align="end">
        <button matButton="filled" type="submit" [disabled]="updateOpinionForm.invalid || wSubmit() || updateOpinionForm.pristine">
            <div class="waiting">
                @if (wSubmit()) {
                    <mat-spinner matPrefix [diameter]="20"></mat-spinner>
                }
                Atualizar
            </div>
        </button>
        <button matButton [mat-dialog-close]="false">Fechar</button>
    </mat-dialog-actions>
</form>
