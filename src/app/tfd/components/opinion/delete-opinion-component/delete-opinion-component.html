<h2 mat-dialog-title>Deletar parecer</h2>
<mat-dialog-content>Você deseja deletar o parecer.</mat-dialog-content>
<mat-dialog-actions>
  <button matButton="filled" [disabled]="wSubmit()" (click)="onDeleteOpinionSubmit()">
    <div class="waiting">
        @if (wSubmit()) {
            <mat-spinner matPrefix [diameter]="20"></mat-spinner>
        }
        Excluir
    </div>
  </button>
  <button matButton [mat-dialog-close]="false">Fechar</button>
</mat-dialog-actions>
