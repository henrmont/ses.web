<section>
    <div class="search">
        <mat-form-field appearance="outline">
          <mat-label>Buscar</mat-label>
          <input matInput (keyup)="applyFilter($event)" placeholder="buscar usuário" #input>
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>
    </div>
    
    <table mat-table [dataSource]="dataSource()">
      
      <ng-container matColumnDef="is_editable">
        <th mat-header-cell *matHeaderCellDef class="center" style="width: 5%;"></th>
        <td mat-cell *matCellDef="let element" class="center">
            <button mat-icon-button [matTooltip]="element.module?.pivot?.is_editable ? 'Travar usuário' : 'Destravar usuário'" (click)="lockUser(element)" [disabled]="checkPermissions('homecare/usuário travar')">
                <mat-icon>{{ element.module?.pivot?.is_editable ? 'lock_open' : 'lock' }}</mat-icon>
            </button>
        </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef> Email </th>
        <td mat-cell *matCellDef="let element"> {{element.email}} </td>
      </ng-container>
    
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Nome </th>
        <td mat-cell *matCellDef="let element"> {{element.name}} </td>
      </ng-container>

      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef> Tipo </th>
        <td mat-cell *matCellDef="let element"> {{element.type}} </td>
      </ng-container>
    
      <ng-container matColumnDef="is_valid">
        <th mat-header-cell *matHeaderCellDef class="center" style="width: 5%;"> Ativo </th>
        <td mat-cell *matCellDef="let element" class="center">
            <button mat-icon-button [matTooltip]="element.module?.pivot?.is_valid ? 'Invalidar usuário' : 'Validar usuário'" (click)="validateUser(element)" [disabled]="checkEditable(element) || checkPermissions('homecare/usuário validar')">
                <mat-icon [className]="element.module?.pivot?.is_valid ? 'valid' : 'invalid'">{{ element.module?.pivot?.is_valid ? 'check' : 'close' }}</mat-icon>
            </button>
        </td>
      </ng-container>
    
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="center" style="width: 20%;"> Ações </th>
        <td mat-cell *matCellDef="let element" class="center">
            <div>
                <button mat-icon-button matTooltip="Detalhes do usuário" (click)="showUser(element)" [disabled]="checkEditable(element)">
                    <mat-icon>visibility</mat-icon>
                </button>
                <button mat-icon-button matTooltip="Regras do usuário" (click)="rolesUser(element)" [disabled]="checkEditable(element) || checkPermissions('homecare/usuário atualizar')">
                    <mat-icon>rule</mat-icon>
                </button>
                <button mat-icon-button matTooltip="Atualizar usuário" (click)="updateUser(element)" [disabled]="checkEditable(element) || checkPermissions('homecare/usuário atualizar')">
                    <mat-icon>drive_file_rename_outline</mat-icon>
                </button>
                <button mat-icon-button matTooltip="Deletar usuário" (click)="deleteUser(element)" [disabled]="checkEditable(element) || checkPermissions('homecare/usuário deletar')">
                    <mat-icon>delete</mat-icon>
                </button>
            </div>
        </td>
      </ng-container>
    
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell center" colspan="6">Nenhum resultado encontrado.</td>
      </tr>
    </table>
</section>
