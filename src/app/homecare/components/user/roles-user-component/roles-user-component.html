<h2 mat-dialog-title>Gerenciar Permissões</h2>

<form>
  <mat-dialog-content>
    @if (isLoading()) {
      <div class="loading-container">
        <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
      </div>
    } @else {
      <p class="subtitle">
        Ajuste os papéis de acesso para o usuário: <strong>{{ data.user.professional.name }}</strong>
      </p>
      
      <mat-card appearance="outlined" class="roles-card">
        <mat-card-content>
          <mat-list class="roles-list">
            @for (item of roles(); track item.id) {
              <mat-list-item class="role-item">
                <div class="role-row">
                  <span class="role-name">{{ formatRoleName(item.name) }}</span>
                  <mat-slide-toggle
                    [checked]="checkRole(item.id)"
                    (toggleChange)="toggleRole(item)"
                    color="primary">
                  </mat-slide-toggle>
                </div>
              </mat-list-item>
            } @empty {
              <p class="empty-msg">Nenhuma permissão disponível encontrada.</p>
            }
          </mat-list>
        </mat-card-content>
      </mat-card>
    }
  </mat-dialog-content>
  
  <mat-dialog-actions align="end">
    <button mat-button type="button" [mat-dialog-close]="false" [disabled]="isSubmitting()">
      Fechar
    </button>
    
    <button 
      mat-flat-button 
      color="primary" 
      type="button" 
      (click)="onSubmit()" 
      [disabled]="userRolesForm.invalid || userRolesForm.pristine || isSubmitting()">
      <div class="waiting">
        @if (isSubmitting()) {
          <mat-spinner [diameter]="20"></mat-spinner>
        }
        <span>{{ isSubmitting() ? 'Salvando...' : 'Salvar Alterações' }}</span>
      </div>
    </button>
  </mat-dialog-actions>
</form>
